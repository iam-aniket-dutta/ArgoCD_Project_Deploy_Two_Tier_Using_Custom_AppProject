apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-backend-application
  namespace: argocd
spec:
  project: argo-demo-project
  source:
    repoURL: https://github.com/iam-aniket-dutta/ArgoCD_Project_Deploy_Two_Tier_Using_Custom_AppProject.git
    targetRevision: HEAD
    path: backend/manifests/deployment
  destination:
    server: https://kubernetes.default.svc
    namespace: app1-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
